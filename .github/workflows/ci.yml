name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: Typecheck / Lint / Test / Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL || 'https://localhost:3000' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-key' }}
      TOKEN_ENC_KEY: ${{ secrets.TOKEN_ENC_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'bbbbbbbbbbbbbbbb' }}
      GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID || 'placeholder-gsc-client-id' }}
      GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET || 'placeholder-gsc-client-secret' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
